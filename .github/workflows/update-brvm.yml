name: Mise à jour BRVM Intelligence

# Se déclenche tous les jours à 19h00 UTC (après la clôture BRVM ~15h GMT
# et la mise à jour de la source de données), + bouton manuel.
on:
  schedule:
    - cron: "0 19 * * 1-5"   # lundi→vendredi, 19h00 UTC
  workflow_dispatch:          # permet de lancer à la main depuis l'onglet Actions

permissions:
  contents: write             # nécessaire pour committer le HTML régénéré

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Régénérer le dashboard avec les derniers cours
        run: |
          python3 update_brvm.py
          # GitHub Pages sert index.html à la racine -> on en fait une copie
          cp brvm-intelligence.html index.html

      - name: Committer si les données ont changé
        run: |
          git config user.name  "brvm-bot"
          git config user.email "brvm-bot@users.noreply.github.com"
          git add brvm-intelligence.html index.html
          if git diff --staged --quiet; then
            echo "Aucun changement de données aujourd'hui."
          else
            git commit -m "MàJ auto des cours BRVM ($(date -u +%Y-%m-%d))"
            git push
          fi
